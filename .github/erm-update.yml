name: ERM Live Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'     # Every hour on the hour
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger ERM Update
        run: |
          echo "🚀 Triggering ERM /update at $(date)"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET "https://ermforecast.onrender.com/update")
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | sed -e 's/.*HTTP_STATUS://')
          
          echo "📡 Status: $STATUS"
          echo "📦 Response:"
          echo "$BODY" | jq . || echo "$BODY"
          
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Update successful"
          else
            echo "❌ Update failed with status $STATUS"
            exit 1
          fi
