name: ERM Data Backup & Persist

on:
  schedule:
    - cron: '*/15 * * * *'     # Every 15 minutes (after the 5-min update trigger)
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Required for push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push any new ERM_Data CSVs
        run: |
          echo "🔍 Checking for new ERM_Data changes..."
          
          git config --global user.name "ERM Data Bot"
          git config --global user.email "erm-bot@github.com"
          
          git add ERM_Data/
          
          if git diff --cached --quiet; then
            echo "✅ No new data to commit"
          else
            git commit -m "📊 Auto-backup: ERM_Data CSVs $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Successfully pushed new ERM_Data CSVs to GitHub"
          fi
