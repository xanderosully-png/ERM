name: ERM Data Backup & Persist (Safety Net)

on:
  schedule:
    - cron: '*/30 * * * *'     # Every 30 minutes (safety net — in-app backup is primary)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push any new ERM_Data CSVs (v10.1)
        run: |
          echo "🔍 Checking for new ERM_Data changes..."
          
          git config --global user.name "ERM Data Bot"
          git config --global user.email "erm-bot@github.com"
          
          git add ERM_Data/
          
          if git diff --cached --quiet; then
            echo "✅ No new data to commit"
          else
            git commit -m "📊 Safety backup: ERM_Data CSVs v10.1 $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Successfully pushed new ERM_Data CSVs to GitHub"
          fi
