name: ERM Live Update

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Ping ERM update endpoint (with cold-start handling)
        run: |
          echo "🚀 Triggering ERM recorder on Render..."
          
          # Robust curl + capture JSON response for visibility
          RESPONSE=$(curl -s -f --max-time 90 --retry 3 --retry-delay 5 \
                       -X GET "https://ermforecast.onrender.com/update" || echo '{"status":"failed"}')
          
          echo "Response: $RESPONSE"
          echo "✅ GitHub Action completed at $(date)"
