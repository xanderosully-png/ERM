name: ERM Live Update

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes — matches your Streamlit refresh
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Ping ERM update endpoint (with cold-start handling)
        run: |
          echo "🚀 Triggering ERM recorder on Render..."
          
          # Robust curl with retries for Render free-tier cold starts
          curl -f --max-time 90 --retry 3 --retry-delay 5 \
               -X GET "https://ermforecast.onrender.com/update" || \
          echo "⚠️ Ping failed (normal on first wake-up or temporary Render hiccup)"
          
          echo "✅ GitHub Action completed at $(date)"
