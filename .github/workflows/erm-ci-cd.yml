name: ERM v8.0 FastAPI CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours — keeps data fresh

permissions:
  contents: write
  actions: read

jobs:
  ci:
    name: Lint • Test • Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff linting
        run: ruff check . --output-format=github

      - name: Black formatting check
        run: black --check --diff .

      - name: Ruff formatting check
        run: ruff format --check .

      - name: Security scan (Bandit)
        run: bandit -r . --severity-level high || true

      - name: FastAPI smoke test (dry-run import)
        run: |
          python -c '
          import os
          os.environ["PORT"] = "0"
          from main import app
          print("✅ main.py imported and FastAPI app loaded successfully")
          '

  deploy:
    name: Auto-Backup Data to GitHub (main/master only)
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git for automated backup
        run: |
          git config --global user.name "ERM Bot"
          git config --global user.email "erm-bot@github.com"

      - name: Commit any new ERM_Data / ERM_State changes
        run: |
          git add ERM_Data/ ERM_State/ || true
          git diff --quiet --cached || git commit -m "ERM v8.0 automated backup - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push || echo "No changes to push or already up-to-date"

      - name: Pipeline success
        run: echo "✅ ERM v8.0 pipeline completed successfully at $(date -u)"
