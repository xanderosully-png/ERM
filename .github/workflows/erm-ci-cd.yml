name: ERM Data Cleanup

on:
  schedule:
    - cron: '0 3 * * *'     # every day at 3 AM UTC
  workflow_dispatch:        # you can also trigger manually

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete old CSVs (> 7 days)
        run: |
          find ERM_Data -name "erm_v8.0_*.csv" -type f -mtime +7 -delete || true
          echo "🧹 Cleaned old CSVs older than 7 days"

      - name: Commit and push cleanup
        run: |
          git config --global user.name "ERM Cleanup Bot"
          git config --global user.email "erm-bot@github.com"
          git add ERM_Data/
          git diff --quiet --exit-code || \
            (git commit -m "🧹 Auto-cleanup: removed CSVs older than 7 days" && \
             git push origin main)
