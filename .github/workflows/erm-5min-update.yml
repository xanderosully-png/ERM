name: ERM 5-Minute Update Trigger

on:
  schedule:
    - cron: '*/5 * * * *'     # Runs every 5 minutes
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  trigger-update:
    runs-on: ubuntu-latest

    steps:
      - name: Wake up & trigger ERM backend update
        run: |
          echo "🚀 Triggering update on correct backend: https://erm-live.onrender.com/update"
          
          # Single clean curl with timeout and clear error reporting
          curl -X GET \
               -H "Accept: application/json" \
               --max-time 30 \
               --fail \
               --silent \
               --show-error \
               "https://erm-live.onrender.com/update" || echo "❌ Update request failed (likely cold start or network hiccup)"

      - name: Show result
        run: echo "✅ 5-minute update workflow completed at $(date)"
