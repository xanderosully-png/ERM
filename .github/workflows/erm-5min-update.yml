name: ERM 5-Minute Update Trigger

on:
  schedule:
    - cron: '*/5 * * * *'     # Every 5 minutes (keeps Render warm + triggers data refresh)
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping ERM /update endpoint
        run: |
          echo "🚀 Triggering ERM update - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          curl -v --fail --location \
               --max-time 120 \
               --retry 3 \
               --retry-delay 10 \
               --retry-max-time 180 \
               ${{ secrets.BACKEND_URL }}/update \
               -H "User-Agent: ERM-GitHub-Action/1.0"
          echo "✅ Update ping completed successfully"
