name: ERM Live Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *'     # Every 15 minutes
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger ERM Update (with retries)
        run: |
          echo "🚀 Triggering ERM /update at $(date)"
          
          for i in {1..3}; do
            echo "📍 Attempt $i of 3..."
            
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET "https://ermforecast.onrender.com/update")
            BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
            STATUS=$(echo "$RESPONSE" | sed -e 's/.*HTTP_STATUS://')
            
            echo "📡 Status: $STATUS"
            echo "📦 Response:"
            echo "$BODY" | jq . || echo "$BODY"
            
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Update successful on attempt $i"
              exit 0
            else
              echo "⚠️ Attempt $i failed with status $STATUS"
              if [ $i -lt 3 ]; then
                echo "🔄 Retrying in 10 seconds..."
                sleep 10
              fi
            fi
          done
          
          echo "❌ All 3 attempts failed"
          exit 1
