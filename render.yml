services:
  - type: web
    name: ermforecast
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn update_service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: xanderosully-png/ERM
        sync: false
      - key: ERM_SEMAPHORE_LIMIT
        value: "5"
        sync: false
    autoDeploy: true
