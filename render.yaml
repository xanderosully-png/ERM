services:
  - type: web
    name: erm-live
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app:main --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"   # already good
    # Optional: add a health check route
    healthCheckPath: "/health"
