# render.yaml
# ERM v9.1 – TWO services: FastAPI backend + Streamlit dashboard
services:
  # ==================== FASTAPI BACKEND ====================
  - type: web
    name: erm-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"   # ← fixed: main:app
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
    healthCheckPath: "/health"
    autoDeploy: true
    disk:
      name: erm-data
      mountPath: /opt/render/project/src/ERM_Data
      sizeGB: 1

  # ==================== STREAMLIT DASHBOARD ====================
  - type: web
    name: erm-dashboard
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: BACKEND_URL
        value: "https://erm-backend.onrender.com"   # ← points to the backend service
    autoDeploy: true
