# render.yaml
# ERM v9.1 — GitHub-only persistence (in-app git backup + safety Action)

services:
  - type: web
    name: erm-live
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false               # e.g. "yourusername/erm-forecast"
      - key: PYTHON_VERSION
        value: "3.12"
    
    healthCheckPath: "/status"    # better than /health
    autoDeploy: true
    # NO disk section — we use git push
