version: "1"

services:
  - type: web
    name: erm-v8-live
    env: python
    plan: free                # change to "starter" later if needed
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --no-access-log
    autoDeploy: true

    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: ${{ github.repository }}
      - key: PORT
        value: "10000"

    # Persistent disk for ERM_Data and ERM_State
    disk:
      name: erm-data-disk
      mountPath: /opt/render/project/src/ERM_Data
      sizeGB: 10

    healthCheckPath: /health

  - type: cron
    name: erm-daily-update
    env: python
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -c '
      import asyncio, httpx
      async def trigger():
          async with httpx.AsyncClient() as client:
              try:
                  resp = await client.get("https://erm-v8.onrender.com/update", timeout=60.0)
                  print("Update triggered:", resp.json())
              except Exception as e:
                  print("Update failed:", e)
      asyncio.run(trigger())
      '
